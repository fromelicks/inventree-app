# Build Android version of the app

name: Android

on:
  workflow_dispatch:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

permissions:
  contents: write

jobs:

  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup FVM
      id: fvm-config-action
      uses: kuhnroyal/flutter-fvm-config-action@v2

    - uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ steps.fvm-config-action.outputs.FLUTTER_VERSION }}
        channel: ${{ steps.fvm-config-action.outputs.FLUTTER_CHANNEL }}
        cache: false
        cache-key: "flutter-:os:-:channel:-:version:-:arch:-:hash:"
        cache-path: "${{ runner.tool_cache }}/flutter/:channel:-:version:-:arch:"
        pub-cache-key: "flutter-pub:os:-:channel:-:version:-:arch:-:hash:"
        pub-cache-path: "${{ runner.tool_cache }}/flutter/:channel:-:version:-:arch:"

    - run: flutter --version

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2.4.2
      with:
        gradle-version: 8.11.1

    - name: Collect Translation Files
      run: |
        cd lib/l10n
        python3 collect_translations.py

    - name: Build for Android
      run: |
        dart pub global activate fvm
        fvm install
        fvm flutter pub get
        fvm flutter build apk --debug

    - name: Prepare nightly release metadata
      if: github.event_name != 'pull_request'
      run: |
        DATE=$(date -u +'%Y%m%d')
        TAG="nightly-${DATE}-${{ github.run_number }}"
        APK_NAME="inventree-${TAG}.apk"
        mv build/app/outputs/flutter-apk/app-debug.apk "build/app/outputs/flutter-apk/${APK_NAME}"
        echo "RELEASE_TAG=${TAG}" >> $GITHUB_ENV
        echo "APK_NAME=${APK_NAME}" >> $GITHUB_ENV

    - name: Create nightly release and upload APK
      if: github.event_name != 'pull_request'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.RELEASE_TAG }}
        name: "Nightly ${{ env.RELEASE_TAG }}"
        body: |
          Automated nightly build

          - **Commit:** ${{ github.sha }}
          - **Branch:** ${{ github.ref_name }}
          - **Run:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
        prerelease: true
        files: build/app/outputs/flutter-apk/${{ env.APK_NAME }}
